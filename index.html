<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OxiCampus | Your Trusted Student Marketplace</title>
    <meta name="description" content="Buy and sell items on campus. OxiCampus connects Ghanaian university students to buy, sell, and trade electronics, books, furniture, and more safely within their campus community." />
    <meta name="keywords" content="campus marketplace, Ghana students, buy and sell, university marketplace, student classifieds, KNUST, University of Ghana, campus trading, student marketplace Ghana, buy sell campus, university trading" />
    <meta name="author" content="OxiCampus" />
    <meta name="theme-color" content="#7E69AB" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://oxiicampus.lovable.app/" />

    <!-- Favicons for all platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <meta name="msapplication-TileImage" content="/logo.png" />
    <meta name="msapplication-TileColor" content="#7E69AB" />

    <!-- Open Graph -->
    <meta property="og:title" content="OxiCampus – Campus Marketplace for Ghana Students" />
    <meta property="og:description" content="Buy and sell items on campus. Connect with students at your university to trade electronics, books, furniture, and more safely." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oxiicampus.lovable.app/" />
    <meta property="og:image" content="https://oxiicampus.lovable.app/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="OxiCampus - Student Marketplace" />
    <meta property="og:site_name" content="OxiCampus" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OxiCampus – Campus Marketplace for Ghana Students" />
    <meta name="twitter:description" content="Buy and sell items on campus. Connect with students at your university to trade safely." />
    <meta name="twitter:image" content="https://oxiicampus.lovable.app/logo.png" />
    <meta name="twitter:image:alt" content="OxiCampus - Student Marketplace" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OxiCampus",
      "description": "The #1 marketplace for university students in Ghana. Buy, sell, and connect with fellow students.",
      "url": "https://oxiicampus.lovable.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://oxiicampus.lovable.app/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OxiCampus",
      "url": "https://oxiicampus.lovable.app/",
      "logo": "https://oxiicampus.lovable.app/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+233-550-617-425",
        "contactType": "customer service",
        "email": "oxicampus@gmail.com",
        "areaServed": "GH",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
